<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommUnity - Offer a Ride</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/ride_style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <header class="navbar">
        <div class="logo-container">
            <img src="../Logo.png" alt="CommUnity Logo" class="brand-logo-img">
            <div class="logo-text-wrapper">
                <span class="logo-text">
                    <span class="logo-comm">Comm</span><span class="logo-unity">Unity</span>
                </span>
                <span class="logo-tagline">"Connecting Students, One Ride at a Time"</span>
            </div>
        </div>
        <nav class="nav-links">
            <a href="../Home%20Page/html/home.html">Home</a>
            <a href="../Onboarding/html/index.html">About US</a>
            <a href="../Trip%20Details/html/trip_details.html">Safety</a>
            <a href="../Trip%20Details/html/trip_details.html">For Drivers</a>
        </nav>
        <div class="nav-right">
            <button class="btn-register" id="registerNowTrigger">Register Now</button>
            <button class="btn-learn" id="learnMoreTrigger">Learn More</button>
        </div>
    </header>

    <main class="main-container">
        <div class="glass-card">
            
            <div class="tab-container">
                <button class="tab-btn" id="tab-find" onclick="switchTab('find')">
                    <i class="fa-solid fa-magnifying-glass"></i> Find a Ride
                </button>
                <button class="tab-btn active" id="tab-offer" onclick="switchTab('offer')">
                    <i class="fa-solid fa-car"></i> Offer a Ride
                </button>
            </div>

            <div id="section-find" class="tab-content">
                <h2 class="section-title">Where to?</h2>
                <div class="form-group">
                    <label>Pickup Location</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" id="find-pickup" placeholder="Enter pickup point (e.g., Gate 1)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Destination</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-flag-checkered"></i>
                        <input type="text" id="find-dropoff" placeholder="Enter drop-off point">
                    </div>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-clock"></i>
                        <input type="time" id="find-time">
                    </div>
                </div>
                <button class="primary-btn" onclick="searchRides()">Search Rides</button>

                <div id="match-results" class="results-container hidden">
                    <h3 class="results-title">Available Matches</h3>
                    <div id="results-list"></div>
                </div>
            </div>

            <div id="section-offer" class="tab-content active">
                <h2 class="section-title">Share your journey</h2>
                <div class="form-group">
                    <label>Pickup Location</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-map-pin"></i>
                        <input type="text" id="offer-pickup" placeholder="Where are you starting?">
                    </div>
                </div>
                <div class="form-group">
                    <label>Departure Time</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-clock"></i>
                        <input type="time" id="offer-time">
                    </div>
                </div>
                <div class="form-group">
                    <label>Number of Available Seats</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-users"></i>
                        <input type="number" id="offer-seats" min="1" max="6" placeholder="e.g., 3">
                    </div>
                </div>
                <button class="primary-btn green-btn" onclick="postRide()">Post Ride Offer</button>
            </div>

        </div>
    </main>

    <div id="toast" class="toast">Message goes here</div>

    <script src="../js/ride_script.js"></script>
</body>
</html>
