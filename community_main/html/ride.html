<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommUnity - Find or Offer a Ride</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/ride_style.css">
    <style>
        .modal-backdrop {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: rgba(3, 7, 18, 0.85) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            z-index: 999999 !important;
        }
        .modal-backdrop.hidden {
            display: none !important;
        }
        .modal-card {
            background: #0b132b !important;
            border: 1px solid rgba(59, 130, 246, 0.2) !important;
            width: 90% !important;
            max-width: 500px !important;
            border-radius: 16px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6) !important;
            overflow: hidden !important;
        }
        .modal-header {
            padding: 20px 24px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }
        .modal-header h2 {
            color: #ffffff !important;
            font-size: 1.25rem !important;
            font-weight: 700 !important;
            margin: 0 !important;
        }
        .modal-close-btn {
            background: none !important;
            border: none !important;
            color: rgba(255, 255, 255, 0.5) !important;
            font-size: 1.5rem !important;
            cursor: pointer !important;
            line-height: 1 !important;
            padding: 0 !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <header class="navbar" style="position: relative; z-index: 9999;">
        <div class="logo-container">
            <img src="../images/Logo.png" alt="CommUnity Logo" class="brand-logo-img">
            <div class="logo-text-wrapper">
                <span class="logo-text">
                    <span class="logo-comm">Comm</span><span class="logo-unity">Unity</span>
                </span>
                <span class="logo-tagline">"Connecting Students, One Ride at a Time"</span>
            </div>
        </div>
        <nav class="nav-links">
            <a href="../html/home.html">Home</a>
            <a href="../html/about.html">About US</a>
            <a href="../html/safety.html">Safety</a>
        </nav>
        <div class="nav-right">
            <button class="btn-register" id="registerNowTrigger">Register Now</button>
            <button class="btn-learn" id="learnMoreTrigger" onclick="document.getElementById('learnMoreModal').classList.remove('hidden')">Learn More</button>
        </div>
    </header>

    <main class="main-container">
        <div class="glass-card">
            <div class="tab-container">
                <button class="tab-btn active" id="tab-find" onclick="switchTab('find')">
                    <i class="fa-solid fa-magnifying-glass"></i> Find a Ride
                </button>
                <button class="tab-btn" id="tab-offer" onclick="switchTab('offer')">
                    <i class="fa-solid fa-car"></i> Offer a Ride
                </button>
            </div>
            
            <div id="section-find" class="tab-content active">
                <h2 class="section-title">Where to?</h2>
                <button class="primary-btn" onclick="searchRides()">Search Rides</button>
            </div>
        </div>
    </main>

    <div class="modal-backdrop hidden" id="learnMoreModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>About CommUnity</h2>
                <button class="modal-close-btn" id="modalCloseBtn" onclick="document.getElementById('learnMoreModal').classList.add('hidden')">&times;</button>
            </div>
            <div class="modal-body" style="color: #fff; font-family: 'Inter', sans-serif; line-height: 1.7; text-align: center; padding: 45px 30px;">
                <div style="font-size: 3.5rem; color: #3b82f6; margin-bottom: 22px; filter: drop-shadow(0 0 15px rgba(59,130,246,0.6));">
                    <i class="fa-solid fa-car-side"></i>
                </div>
                <p style="font-size: 1.1rem; color: #e5e7eb; margin: 0 auto; max-width: 520px; font-weight: 500;">
                    Discover how <span style="color: #3b82f6; font-weight: 800; text-shadow: 0 0 10px rgba(59,130,246,0.4);">CommUnity</span> makes campus travel more convenient by connecting student riders and drivers based on their routes and schedules.
                </p>
            </div>
        </div>
    </div>

    <script src="../js/ride_script.js"></script>
</body>
</html>
